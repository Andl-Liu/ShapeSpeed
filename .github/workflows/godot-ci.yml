name: "Export and Deploy to Pages"

on:
  push:
    tags:
      - "v*"  # 推送标签时触发

env:
  GODOT_VERSION: 4.7.1
  EXPORT_NAME: ShapeSpeed

permissions:
    contents: write

jobs:
  # 1. 构建 Job：只负责导出 Web 文件，并上传为 artifacts
  export-web:
    name: Export for Web
    runs-on: ubuntu-22.04
    container:
      image: barichello/godot-ci:4.7.1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Godot export templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable

      - name: Export for Web
        run: |
          mkdir -v -p ./build/web
          godot --headless --export-release "Web" ./build/web/index.html

      - name: Install wasm-opt (binaryen)
        run: |
          apt-get update && apt-get install -y binaryen

      - name: Optimize wasm for size
        run: |
          echo "Before optimization:"
          ls -lh ./build/web/index.wasm
          wasm-opt -Oz --enable-bulk-memory ./build/web/index.wasm -o ./build/web/index.wasm
          echo "After optimization:"
          ls -lh ./build/web/index.wasm

      - name: Check wasm size limit
        run: |
          FILE_SIZE=$(stat -c%s ./build/web/index.wasm)
          MAX_SIZE=26214400  # 25 MiB in bytes
          echo "index.wasm size: $FILE_SIZE bytes (limit: $MAX_SIZE bytes)"
          if [ "$FILE_SIZE" -gt "$MAX_SIZE" ]; then
            echo "::warning::index.wasm still exceeds 25 MiB limit! Consider reducing Godot export features or using R2."
          fi

      # 关键步骤：将构建产物上传，供后续 Job 使用
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: ./build/web

  # 2. 部署到 GitHub Pages
  deploy-gh-pages:
    name: Deploy to GitHub Pages
    needs: export-web  # 等待构建完成
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: ./build/web

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ./build/web
          branch: gh-pages

  # 3. 部署到 Cloudflare Pages
  deploy-cloudflare:
    name: Deploy to Cloudflare Pages
    needs: export-web  # 等待构建完成
    runs-on: ubuntu-22.04
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: ./build/web

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy ./build/web --project-name=shape-speed