<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.2" r="0.9">
      <stop offset="0" stop-color="#334155" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#0F172A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tri" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#0E7490"/>
    </linearGradient>
    <linearGradient id="cir" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FDBA74"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
  </defs>

  <!-- 背景：深色圆角方块 + 微光 -->
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>
  <rect width="256" height="256" rx="56" fill="url(#glow)"/>

  <!-- 圆环：代表「形状」 -->
  <circle cx="128" cy="128" r="84" fill="none" stroke="url(#cir)" stroke-width="12"/>

  <!-- 三角形：代表「角度」，倾斜10°传达「速」的动感 -->
  <polygon points="128,58 190,180 66,180" fill="url(#tri)" transform="rotate(10 128 128)"/>

  <!-- 中心圆点：代表「长度」，视觉焦点 -->
  <circle cx="128" cy="128" r="11" fill="#FACC15"/>
</svg>
